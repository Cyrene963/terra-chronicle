<!DOCTYPE html>
<html>
<head>
  <title>Terra Chronicle - Effect Sprites Test</title>
  <style>
    body {
      margin: 0;
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
    }
    #canvas {
      display: block;
      margin: 20px auto;
      border: 2px solid #4a4a6a;
      background: #0f3460;
    }
    .controls {
      text-align: center;
      padding: 20px;
      background: #16213e;
      border-bottom: 2px solid #4a4a6a;
    }
    button {
      margin: 5px;
      padding: 12px 24px;
      font-size: 16px;
      cursor: pointer;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 5px;
      transition: all 0.3s;
    }
    button:hover {
      background: #ff6b81;
      transform: scale(1.05);
    }
    button:active {
      transform: scale(0.95);
    }
    .info {
      text-align: center;
      padding: 10px;
      font-size: 14px;
      color: #aaa;
    }
    h1 {
      margin: 0 0 15px 0;
      color: #e94560;
      font-size: 28px;
    }
    .status {
      margin-top: 10px;
      font-size: 14px;
      color: #4ecdc4;
    }
  </style>
</head>
<body>
  <div class="controls">
    <h1>🎮 Terra Chronicle - Effect Sprites Demo</h1>
    <div>
      <button onclick="showEffect('capture_ring')">🔮 Capture Ring</button>
      <button onclick="showEffect('evolution_burst')">✨ Evolution Burst</button>
      <button onclick="showEffect('level_up_sparkle')">⭐ Level Up Sparkle</button>
      <button onclick="showEffect('healing_aura')">💚 Healing Aura</button>
      <button onclick="showEffect('damage_impact')">⚔️ Damage Impact</button>
    </div>
    <div class="status" id="status">Click a button to display an effect</div>
  </div>
  <canvas id="canvas" width="800" height="600"></canvas>
  <div class="info">
    All effects are 512×512 PNG sprites. Click buttons to cycle through each effect.
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');

    const effects = {
      capture_ring: { name: 'Capture Ring', desc: 'Golden glowing ring with transparent center' },
      evolution_burst: { name: 'Evolution Burst', desc: 'Radiant light explosion' },
      level_up_sparkle: { name: 'Level Up Sparkle', desc: 'Star particles' },
      healing_aura: { name: 'Healing Aura', desc: 'Soft green glow' },
      damage_impact: { name: 'Damage Impact', desc: 'Red slash effect' }
    };

    let currentEffect = null;
    let animationFrame = 0;
    let rotation = 0;
    let scale = 1;
    let scaleDirection = 1;

    function showEffect(effectName) {
      currentEffect = effectName;
      const img = new Image();
      img.src = `assets/sprites/${effectName}.png`;

      status.textContent = `Loading ${effects[effectName].name}...`;

      img.onload = () => {
        status.textContent = `✓ ${effects[effectName].name} - ${effects[effectName].desc}`;
        animationFrame = 0;
        rotation = 0;
        scale = 1;
        animate(img);
      };

      img.onerror = () => {
        status.textContent = `❌ Failed to load ${effectName}.png`;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#fff';
        ctx.font = '20px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(`Error loading ${effectName}.png`, canvas.width / 2, canvas.height / 2);
      };
    }

    function animate(img) {
      if (currentEffect === null || img.src.indexOf(currentEffect) === -1) {
        return; // Stop animation if effect changed
      }

      // Clear canvas
      ctx.fillStyle = '#0f3460';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Calculate animation parameters
      animationFrame++;
      rotation += 0.005;

      // Pulsing scale effect
      scale += 0.005 * scaleDirection;
      if (scale > 1.15) scaleDirection = -1;
      if (scale < 0.85) scaleDirection = 1;

      // Draw effect in center with animation
      ctx.save();
      ctx.translate(canvas.width / 2, canvas.height / 2);
      ctx.rotate(rotation);
      ctx.scale(scale, scale);

      // Set opacity for pulsing
      const opacity = 0.85 + 0.15 * Math.sin(animationFrame * 0.05);
      ctx.globalAlpha = opacity;

      ctx.drawImage(img, -256, -256, 512, 512);
      ctx.restore();

      // Draw info overlay
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(10, 10, 250, 80);

      ctx.fillStyle = '#4ecdc4';
      ctx.font = 'bold 18px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(effects[currentEffect].name, 20, 35);

      ctx.fillStyle = '#aaa';
      ctx.font = '14px sans-serif';
      ctx.fillText(effects[currentEffect].desc, 20, 55);
      ctx.fillText(`Frame: ${animationFrame}`, 20, 75);

      requestAnimationFrame(() => animate(img));
    }

    // Initial display
    ctx.fillStyle = '#fff';
    ctx.font = '24px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Click a button above to view effects', canvas.width / 2, canvas.height / 2);
  </script>
</body>
</html>
